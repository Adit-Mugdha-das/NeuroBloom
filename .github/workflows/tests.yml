name: NeuroBloom CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────
  # Frontend unit tests (Vitest)
  # ──────────────────────────────────────────────
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-svelte

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ──────────────────────────────────────────────
  # Backend API tests (pytest + SQLite in-memory)
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-httpx

      # No real Postgres needed — conftest.py overrides get_session with SQLite
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          POSTGRES_HOST: localhost
          POSTGRES_DB: neurobloom_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: pytest tests/ -v --tb=short
