<!DOCTYPE html>
<html>
<head>
    <title>Backend Connection Test</title>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <button onclick="testConnection()">Test Backend Connection</button>
    <button onclick="testLogin()">Test Patient Login</button>
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/', {
                    method: 'GET',
                });
                const data = await response.json();
                resultDiv.innerHTML = `<strong>✅ Backend is running!</strong><br>${JSON.stringify(data, null, 2)}`;
                resultDiv.style.background = '#d4edda';
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ Backend connection failed!</strong><br>${error.message}<br><br>Make sure the backend server is running on port 8000`;
                resultDiv.style.background = '#f8d7da';
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@test.com',
                        password: 'test123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<strong>✅ Login endpoint working!</strong><br>${JSON.stringify(data, null, 2)}`;
                    resultDiv.style.background = '#d4edda';
                } else {
                    resultDiv.innerHTML = `<strong>⚠️ Login response (${response.status}):</strong><br>${JSON.stringify(data, null, 2)}`;
                    resultDiv.style.background = '#fff3cd';
                }
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ Login test failed!</strong><br>${error.message}`;
                resultDiv.style.background = '#f8d7da';
            }
        }
    </script>
</body>
</html>
