<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const DEFAULT_LOCALE = 'en';
				const STORAGE_KEY = 'preferred-locale';
				const root = document.documentElement;
				let locale = DEFAULT_LOCALE;

				try {
					const storedUser = JSON.parse(localStorage.getItem('user') || 'null');
					const preferredLocale = storedUser?.preferences?.language;
					if (preferredLocale === 'en' || preferredLocale === 'bn') {
						locale = preferredLocale;
					} else {
						const storedLocale = localStorage.getItem(STORAGE_KEY);
						if (storedLocale === 'en' || storedLocale === 'bn') {
							locale = storedLocale;
						}
					}
				} catch (_error) {
					locale = DEFAULT_LOCALE;
				}

				root.lang = locale === 'bn' ? 'bn-BD' : 'en';
				root.dataset.locale = locale;
				root.dataset.localeBoot = locale;
				root.dataset.localePending = 'false';

				window.__NB_LOCALE__ = locale;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
